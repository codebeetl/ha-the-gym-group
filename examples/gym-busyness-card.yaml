type: custom:apexcharts-card
header:
  show: false
graph_span: 24h
span:
  start: day
now:
  show: true
  label: Now
yaxis:
  - id: people
    min: 0
    max: ~100
    apex_config:
      title:
        text: Number of People
series:
  - entity: sensor.bury_st_edmunds_gym_population
    name: 4wk ago
    color: "#003f7f"
    stroke_width: 1
    opacity: 0.2
    type: area
    yaxis_id: people
    offset: "-28d"
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_gym_population
    name: 3wk ago
    color: "#004d99"
    stroke_width: 1
    opacity: 0.25
    type: area
    yaxis_id: people
    offset: "-21d"
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_gym_population
    name: 2wk ago
    color: "#005cb3"
    stroke_width: 1
    opacity: 0.3
    type: area
    yaxis_id: people
    offset: "-14d"
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_gym_population
    name: Last Week
    color: "#0066cc"
    stroke_width: 2
    opacity: 0.4
    type: area
    yaxis_id: people
    offset: "-7d"
    show:
      legend_value: true
      in_header: false
  - entity: sensor.bury_st_edmunds_gym_population
    name: Gym Now
    color: "#00bbff"
    stroke_width: 2
    yaxis_id: people
    show:
      legend_value: true
      in_header: false
  - entity: sensor.bury_st_edmunds_last_check_in
    name: Visit (this week)
    color: "#ff8800"
    opacity: 1.0
    type: column
    yaxis_id: people
    data_generator: |
      var h = (entity.attributes && entity.attributes.checkin_history) || [];
      var now = new Date(); var dow = now.getDay();
      var s = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      for (var i = 0; i < h.length; i++) {
        if (!h[i].datetime) continue;
        var d = new Date(h[i].datetime);
        if (d.getDay() !== dow) continue;
        if (Math.round((s - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 604800000) !== 0) continue;
        var t = s.getTime() + d.getHours() * 3600000 + d.getMinutes() * 60000;
        if (t > now.getTime()) return [];
        return [[t, Math.min(h[i].duration_minutes || 100, 100)]];
      }
      return [];
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_last_check_in
    name: Visit (1wk ago)
    color: "#ff8800"
    opacity: 0.55
    type: column
    yaxis_id: people
    data_generator: |
      var h = (entity.attributes && entity.attributes.checkin_history) || [];
      var now = new Date(); var dow = now.getDay();
      var s = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      for (var i = 0; i < h.length; i++) {
        if (!h[i].datetime) continue;
        var d = new Date(h[i].datetime);
        if (d.getDay() !== dow) continue;
        if (Math.round((s - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 604800000) !== 1) continue;
        var t = s.getTime() + d.getHours() * 3600000 + d.getMinutes() * 60000;
        if (t > now.getTime()) return [];
        return [[t, Math.min(h[i].duration_minutes || 100, 100)]];
      }
      return [];
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_last_check_in
    name: Visit (2wk ago)
    color: "#ff8800"
    opacity: 0.3
    type: column
    yaxis_id: people
    data_generator: |
      var h = (entity.attributes && entity.attributes.checkin_history) || [];
      var now = new Date(); var dow = now.getDay();
      var s = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      for (var i = 0; i < h.length; i++) {
        if (!h[i].datetime) continue;
        var d = new Date(h[i].datetime);
        if (d.getDay() !== dow) continue;
        if (Math.round((s - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 604800000) !== 2) continue;
        var t = s.getTime() + d.getHours() * 3600000 + d.getMinutes() * 60000;
        if (t > now.getTime()) return [];
        return [[t, Math.min(h[i].duration_minutes || 100, 100)]];
      }
      return [];
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_last_check_in
    name: Visit (3wk ago)
    color: "#ff8800"
    opacity: 0.15
    type: column
    yaxis_id: people
    data_generator: |
      var h = (entity.attributes && entity.attributes.checkin_history) || [];
      var now = new Date(); var dow = now.getDay();
      var s = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      for (var i = 0; i < h.length; i++) {
        if (!h[i].datetime) continue;
        var d = new Date(h[i].datetime);
        if (d.getDay() !== dow) continue;
        if (Math.round((s - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 604800000) !== 3) continue;
        var t = s.getTime() + d.getHours() * 3600000 + d.getMinutes() * 60000;
        if (t > now.getTime()) return [];
        return [[t, Math.min(h[i].duration_minutes || 100, 100)]];
      }
      return [];
    show:
      legend_value: false
      in_header: false
  - entity: sensor.bury_st_edmunds_last_check_in
    name: Visit (4wk ago)
    color: "#ff8800"
    opacity: 0.07
    type: column
    yaxis_id: people
    data_generator: |
      var h = (entity.attributes && entity.attributes.checkin_history) || [];
      var now = new Date(); var dow = now.getDay();
      var s = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      for (var i = 0; i < h.length; i++) {
        if (!h[i].datetime) continue;
        var d = new Date(h[i].datetime);
        if (d.getDay() !== dow) continue;
        if (Math.round((s - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 604800000) !== 4) continue;
        var t = s.getTime() + d.getHours() * 3600000 + d.getMinutes() * 60000;
        if (t > now.getTime()) return [];
        return [[t, Math.min(h[i].duration_minutes || 100, 100)]];
      }
      return [];
    show:
      legend_value: false
      in_header: false
apex_config:
  plotOptions:
    bar:
      columnWidth: "3px"
  tooltip:
    x:
      format: HH:mm
    y:
      formatter: "[[fn: function(val, opts) { if (opts.seriesIndex < 5) return val + ' people'; var weeksAgo = opts.seriesIndex - 5; var d = new Date(); d.setDate(d.getDate() - weeksAgo * 7); var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return val + ' min (' + days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ')'; }]]"
  legend:
    show: true
    position: top
  xaxis:
    labels:
      format: HH:mm
